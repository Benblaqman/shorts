name: Hourly YouTube Trend Processing

on:
  schedule:
    # Trigger automatically at the start of every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

permissions:
  contents: write # Grants runner write permission to push clips and dashboard html

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client yt-dlp moviepy pillow

    - name: Run Video Processing Script
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: |
        python cron_job.py

    - name: Commit and Push New Video Clips & Dashboard
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Stage all changes within docs/ directory
        git add docs/*
        
        # Prevent run failure if no updates occur this hour
        git commit -m "Automated hourly video clip and dashboard update [skip ci]" || echo "No changes to commit"
        
        # Directly target main branch to avoid detached HEAD tracking blocks
        git push origin HEAD:main
